<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resetare parolă · Vital Signs</title>
</head>
<body style="margin:0;padding:0;background-color:#121212;font-family:Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#121212;">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <table width="480" cellpadding="0" cellspacing="0" border="0"
               style="max-width:480px;width:100%;background-color:#2a2a2a;border-radius:20px;">

          <!-- Header -->
          <tr>
            <td align="center"
                style="background-color:#008F8C;border-radius:20px 20px 0 0;padding:36px 32px 28px;">
              <p style="margin:0 0 4px;font-size:22px;font-weight:700;color:#ffffff;">
                Resetare parolă
              </p>
              <p style="margin:0;font-size:13px;color:rgba(255,255,255,0.80);">
                Vital Signs &middot; Monitor Sănătate
              </p>
            </td>
          </tr>

          <!-- Corp -->
          <tr>
            <td style="padding:32px 32px 8px;">

              <p style="margin:0 0 8px;font-size:15px;font-weight:600;color:#E0E0E0;">
                Salut,
              </p>
              <p style="margin:0 0 24px;font-size:14px;color:#9E9E9E;line-height:1.6;">
                Am primit o solicitare de resetare a parolei pentru contul asociat acestui email.
                Dacă ai trimis tu această cerere, apasă butonul de mai jos.
              </p>

              <!-- Separator -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr><td style="height:1px;background-color:#383838;"></td></tr>
              </table>
              <br />

              <!-- Buton -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom:24px;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;background-color:#008F8C;color:#ffffff;
                              font-size:15px;font-weight:700;text-decoration:none;
                              padding:15px 44px;border-radius:12px;letter-spacing:0.3px;">
                      Resetează parola
                    </a>
                  </td>
                </tr>
              </table>


            </td>
          </tr>


        </table>

      </td>
    </tr>
  </table>

</body>
</html>
