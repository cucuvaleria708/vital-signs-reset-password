<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resetare parolă · Vital Signs</title>
  <style>
    :root {
      --bg:           #121212;
      --surface-high: #333333;
      --teal:         #008F8C;
      --teal-light:   #4DB6B4;
      --text-primary: #E0E0E0;
      --text-secondary:#9E9E9E;
      --radius:       16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface-high);
      border-radius: var(--radius);
      padding: 40px 28px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .icon {
      width: 64px; height: 64px;
      background: var(--teal);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 30px; line-height: 1;
    }
    h1 { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; }
    p  { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(0,143,140,0.25);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg-error {
      background: rgba(255,23,68,0.10);
      color: #FF5252;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 24px;
      display: none;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      background: var(--teal);
      color: #fff;
      font-size: 14px; font-weight: 600;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
<div class="card">

  <div id="loading">
    <div class="icon">&#128274;</div>
    <h1>Se deschide aplicația...</h1>
    <p>Te redirecționăm înapoi în Vital Signs pentru a seta parola nouă.</p>
    <div class="spinner"></div>
  </div>

  <div id="error" class="msg-error"></div>

</div>

<script>
  (function () {
    var params   = new URLSearchParams(window.location.search);
    var fragment = new URLSearchParams(window.location.hash.substring(1));
    var code     = params.get('code');
    var token    = fragment.get('access_token');
    var type     = fragment.get('type') || params.get('type');

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      var el = document.getElementById('error');
      el.innerHTML = msg;
      el.style.display = 'block';
    }

    if (code) {
      // PKCE flow — trimite codul la app
      window.location.href = 'monitorsanatate://reset-password?code=' + encodeURIComponent(code);

      // Fallback: dacă app-ul nu s-a deschis în 2s, arată mesaj
      setTimeout(function () {
        showError(
          'Nu s-a putut deschide aplicația automat.<br><br>' +
          'Asigură-te că aplicația <strong>Vital Signs</strong> este instalată pe dispozitiv, ' +
          'apoi apasă butonul de mai jos.' +
          '<br><a class="btn" href="monitorsanatate://reset-password?code=' + encodeURIComponent(code) + '">Deschide aplicația</a>'
        );
      }, 2000);

    } else if (token && type === 'recovery') {
      // Implicit flow (fallback vechi)
      window.location.href = 'monitorsanatate://reset-password#access_token=' + token + '&type=recovery';

      setTimeout(function () {
        showError(
          'Nu s-a putut deschide aplicația automat.<br><br>' +
          '<a class="btn" href="monitorsanatate://reset-password#access_token=' + token + '&type=recovery">Deschide aplicația</a>'
        );
      }, 2000);

    } else {
      showError('Link invalid sau expirat. Solicită un nou email de resetare din aplicație.');
    }
  })();
</script>
</body>
</html>
