<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resetare parolă · Vital Signs</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Credentialele Supabase sunt in config.js (gitignored) -->
  <script src="config.js"></script>
  <style>
    /* ── Culori identice cu aplicația Android ── */
    :root {
      --bg:           #121212;
      --surface:      #252525;
      --surface-high: #333333;
      --teal:         #008F8C;
      --teal-light:   #4DB6B4;
      --teal-dark:    #005E5C;
      --text-primary: #E0E0E0;
      --text-secondary:#9E9E9E;
      --text-disabled: #616161;
      --error:        #FF1744;
      --radius:       16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface-high);
      border-radius: var(--radius);
      padding: 36px 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* ── Header ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      text-align: center;
    }

    .icon-box {
      width: 56px;
      height: 56px;
      background: var(--teal);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .icon-box svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ── Separator ── */
    .divider {
      height: 1px;
      background: var(--surface);
      margin: 0 0 24px;
    }

    /* ── Input ── */
    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.4px;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--surface);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 15px;
      padding: 12px 44px 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--teal);
    }

    .toggle-btn {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-disabled);
      display: flex;
      align-items: center;
    }

    .toggle-btn:hover { color: var(--text-secondary); }

    .toggle-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Buton principal ── */
    .btn-primary {
      width: 100%;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      padding: 14px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:hover:not(:disabled) { background: var(--teal-light); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary.success  { background: var(--teal-light); }

    /* ── Spinner ── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mesaje ── */
    .msg {
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      line-height: 1.5;
      display: none;
    }

    .msg.error   { background: rgba(255,23,68,0.12); color: #FF5252; display: block; }
    .msg.success { background: rgba(77,182,180,0.12); color: var(--teal-light); display: block; }
    .msg.info    { background: rgba(0,143,140,0.10); color: var(--teal-light); display: block; }

    /* ── Hint forță parolă ── */
    .hint {
      font-size: 11px;
      color: var(--text-disabled);
      margin-top: 4px;
    }

    /* ── Ecran loading inițial ── */
    #loading-screen {
      text-align: center;
    }

    #loading-screen .spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 16px;
    }

    /* ── Ecran succes final ── */
    #success-screen {
      text-align: center;
      display: none;
    }

    .check-circle {
      width: 64px;
      height: 64px;
      background: rgba(77,182,180,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .check-circle svg {
      width: 32px;
      height: 32px;
      stroke: var(--teal-light);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .app-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--teal-light);
      font-size: 13px;
      text-decoration: none;
      font-weight: 500;
    }

    .app-link:hover { text-decoration: underline; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-disabled);
      margin-top: 24px;
    }
  </style>
</head>
<body>
<div class="card">

  <!-- Loading inițial: se afișează cât timp se procesează token-ul din URL -->
  <div id="loading-screen">
    <div class="icon-box" style="margin:0 auto 16px;">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <div class="spinner"></div>
    <p style="color:var(--text-secondary);font-size:14px;">Se verifică link-ul...</p>
  </div>

  <!-- Formular resetare parolă -->
  <div id="reset-form" style="display:none;">
    <div class="header">
      <div class="icon-box">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1>Parolă nouă</h1>
      <p class="subtitle">Introdu noua parolă pentru contul tău<br><strong id="user-email" style="color:var(--teal-light);"></strong></p>
    </div>
    <div class="divider"></div>

    <div id="form-error" class="msg error"></div>

    <div class="field">
      <label for="new-password">Parolă nouă</label>
      <div class="input-wrap">
        <input type="password" id="new-password" placeholder="Minim 6 caractere" autocomplete="new-password" />
        <button class="toggle-btn" type="button" onclick="toggleVis('new-password', this)">
          <svg id="eye1" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <p class="hint">Minim 6 caractere</p>
    </div>

    <div class="field">
      <label for="confirm-password">Confirmă parola</label>
      <div class="input-wrap">
        <input type="password" id="confirm-password" placeholder="Repetă parola nouă" autocomplete="new-password" />
        <button class="toggle-btn" type="button" onclick="toggleVis('confirm-password', this)">
          <svg id="eye2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="submit-btn" onclick="handleReset()">
      Setează parola nouă
    </button>
  </div>

  <!-- Ecran succes final -->
  <div id="success-screen">
    <div class="check-circle">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Parolă schimbată!</h1>
    <p class="subtitle" style="margin-top:8px;">Parola ta a fost actualizată cu succes.<br>Te poți autentifica acum în aplicație.</p>
    <a href="monitorsanatate://callback" class="app-link">↗ Deschide aplicația</a>
  </div>

  <p class="footer">Vital Signs · Date protejate conform GDPR</p>
</div>

<script>
  if (!window.APP_CONFIG || !window.APP_CONFIG.SUPABASE_URL.startsWith('https://')) {
    document.getElementById('loading-screen').innerHTML =
      '<div class="msg error" style="display:block">⚠ Fisierul <strong>config.js</strong> lipseste sau nu a fost completat.<br>' +
      'Copiaza <code>config.example.js</code> in <code>config.js</code> si adauga credentialele Supabase.</div>';
    throw new Error('APP_CONFIG nedefinit');
  }
  const SUPABASE_URL      = window.APP_CONFIG.SUPABASE_URL;
  const SUPABASE_ANON_KEY = window.APP_CONFIG.SUPABASE_ANON_KEY;

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { flowType: 'pkce' }
  });

  // ── Toggle vizibilitate parolă ──────────────────────────────────
  function toggleVis(inputId, btn) {
    const inp = document.getElementById(inputId);
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    btn.querySelector('svg').innerHTML = isText
      ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
      : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  }

  // ── Setare stare buton ──────────────────────────────────────────
  function setLoading(loading) {
    const btn = document.getElementById('submit-btn');
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<div class="spinner"></div> Se salvează...'
      : 'Setează parola nouă';
  }

  function showError(msg) {
    const el = document.getElementById('form-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function clearError() {
    const el = document.getElementById('form-error');
    el.style.display = 'none';
  }

  // ── Procesare token din URL ─────────────────────────────────────
  async function init() {
    const params    = new URLSearchParams(window.location.search);
    const fragment  = new URLSearchParams(window.location.hash.substring(1));
    const code      = params.get('code');
    const token     = fragment.get('access_token');
    const type      = fragment.get('type') || params.get('type');

    try {
      if (code) {
        // PKCE flow (implicit în Supabase Kotlin SDK v3)
        const { error } = await sb.auth.exchangeCodeForSession(code);
        if (error) throw error;
      } else if (token && type === 'recovery') {
        // Implicit flow (fallback)
        const refreshToken = fragment.get('refresh_token') || '';
        const { error } = await sb.auth.setSession({ access_token: token, refresh_token: refreshToken });
        if (error) throw error;
      } else {
        throw new Error('Link invalid sau expirat. Solicită un nou email de resetare.');
      }

      // Afișează emailul utilizatorului
      const { data: { user } } = await sb.auth.getUser();
      if (user?.email) {
        document.getElementById('user-email').textContent = user.email;
      }

      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('reset-form').style.display     = 'block';

    } catch (err) {
      document.getElementById('loading-screen').innerHTML = `
        <div class="msg error" style="display:block;margin-top:8px;">
          ⚠ ${err.message || 'Link invalid sau expirat.'}
          <br><br>
          <a href="monitorsanatate://callback" style="color:var(--teal-light);font-weight:600;">
            Deschide aplicația
          </a> și solicită un nou email de resetare.
        </div>`;
    }
  }

  // ── Trimitere parolă nouă ───────────────────────────────────────
  async function handleReset() {
    clearError();
    const pwd     = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;

    if (pwd.length < 6) {
      showError('Parola trebuie să aibă cel puțin 6 caractere.'); return;
    }
    if (pwd !== confirm) {
      showError('Parolele nu coincid.'); return;
    }

    setLoading(true);
    try {
      const { error } = await sb.auth.updateUser({ password: pwd });
      if (error) throw error;

      document.getElementById('reset-form').style.display    = 'none';
      document.getElementById('success-screen').style.display = 'block';

      // Încearcă deschiderea aplicației automat după 1.5s
      setTimeout(() => {
        window.location.href = 'monitorsanatate://callback';
      }, 1500);

    } catch (err) {
      showError(err.message || 'Eroare la schimbarea parolei. Încearcă din nou.');
      setLoading(false);
    }
  }

  // Enter key pe câmpuri
  ['new-password', 'confirm-password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') handleReset();
    });
  });

  init();
</script>
</body>
</html>
