<!DOCTYPE html>
  <html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Resetare parolă – Vital Signs</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f4f6f9;font-family:'Segoe UI',Arial,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f9;padding:40px 0;">
      <tr>
        <td align="center">
          <table width="560" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">

            <!-- Header -->
            <tr>
              <td style="background-color:#008F8C;padding:36px 40px;text-align:center;">
                <p style="margin:0;font-size:13px;color:#a8c8ff;letter-spacing:2px;text-transform:uppercase;">aplicație medicală</p>
                <h1 style="margin:8px 0 0;font-size:32px;font-weight:700;color:#ffffff;letter-spacing:1px;">Vital Signs</h1>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="padding:40px 40px 32px;">
                <h2 style="margin:0 0 16px;font-size:22px;color:#1a1a2e;font-weight:600;">Resetare parolă</h2>
                <p style="margin:0 0 16px;font-size:15px;color:#444;line-height:1.7;">
                  Am primit o cerere de resetare a parolei pentru contul tău din aplicația <strong>Vital Signs</strong>.
                </p>
                <p style="margin:0 0 28px;font-size:15px;color:#444;line-height:1.7;">
                  Apasă butonul de mai jos pentru a seta o parolă nouă:
                </p>

                <!-- Button -->
                <table cellpadding="0" cellspacing="0" style="margin:0 auto 32px;">
                  <tr>
                    <td style="background-color:#008F8C;border-radius:8px;">
                      <a href="{{ .ConfirmationURL }}"
                         style="display:inline-block;padding:14px 36px;font-size:16px;font-weight:600;color:#ffffff;text-decoration:none;letter-spacing:0.5px;">
                        Resetează parola
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Divider -->
            <tr>
              <td style="padding:0 40px;">
                <hr style="border:none;border-top:1px solid #eef0f4;margin:0;"/>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding:24px 40px;text-align:center;">
                <p style="margin:0 0 6px;font-size:12px;color:#aaa;">
                  Dacă nu ai solicitat tu resetarea parolei, poți ignora acest email în siguranță.
                </p>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
  </html>
